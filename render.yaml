services:
  - type: web
    name: gluten-free-map-api
    runtime: node
    plan: free
    region: virginia
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build:api
    startCommand: NODE_ENV=production npm run start
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: FRONTEND_URL
        value: https://gluten-free-map.onrender.com
      - key: BACKEND_URL
        value: https://gluten-free-map-api.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://gluten-free-map.onrender.com
      - key: WORKOS_API_KEY
        sync: false
      - key: WORKOS_CLIENT_ID
        sync: false
      - key: WORKOS_COOKIE_PASSWORD
        sync: false
      - key: UPLOADTHING_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gluten-free-map-db
          property: connectionString
  - type: web
    name: gluten-free-map
    runtime: static
    region: virginia
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build:web
    staticPublishPath: dist/frontend
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        value: https://gluten-free-map-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: gluten-free-map-db
    plan: free
    region: virginia
    postgresMajorVersion: '16'
    databaseName: gluten_free_map
    user: gluten_free_map
    ipAllowList: []
