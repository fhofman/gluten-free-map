services:
  - type: web
    name: gluten-free-map
    runtime: node
    plan: free
    region: virginia
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build
    startCommand: NODE_ENV=production npm run start
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: HOST
        value: 0.0.0.0
      - key: FRONTEND_URL
        value: https://gluten-free-map.onrender.com
      - key: BACKEND_URL
        value: https://gluten-free-map.onrender.com
      - key: WORKOS_REDIRECT_URI
        value: https://gluten-free-map.onrender.com/api/auth/callback
      - key: ALLOWED_ORIGINS
        value: https://gluten-free-map.onrender.com
      - key: VITE_API_BASE_URL
        value: /api
      - key: WORKOS_API_KEY
        sync: false
      - key: WORKOS_CLIENT_ID
        sync: false
      - key: WORKOS_COOKIE_PASSWORD
        sync: false
      - key: UPLOADTHING_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gluten-free-map-db
          property: connectionString

databases:
  - name: gluten-free-map-db
    plan: free
    region: virginia
    postgresMajorVersion: '16'
    databaseName: gluten_free_map
    user: gluten_free_map
    ipAllowList: []
